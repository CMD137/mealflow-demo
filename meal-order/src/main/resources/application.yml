spring:
  application:
    name: meal-order
  datasource:
    url: ${ORDER_DB_URL:jdbc:h2:mem:meal_order;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1}
    username: ${ORDER_DB_USERNAME:sa}
    password: ${ORDER_DB_PASSWORD:}
    driver-class-name: ${ORDER_DB_DRIVER:org.h2.Driver}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:4}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  sql:
    init:
      mode: always
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
server:
  port: 8105
management:
  endpoints:
    web:
      exposure:
        include: health,info
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV_ADDR:localhost:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:mealflow-order-producer}
mealflow:
  outbox:
    publisher: ${OUTBOX_PUBLISHER:log}
    topic: ${OUTBOX_TOPIC:mealflow-order-events}
    scheduler-enabled: ${OUTBOX_SCHEDULER_ENABLED:true}
    initial-delay-ms: ${OUTBOX_INITIAL_DELAY_MS:5000}
    fixed-delay-ms: ${OUTBOX_FIXED_DELAY_MS:5000}
  mq:
    payment-consumer:
      enabled: ${PAYMENT_EVENT_CONSUMER_ENABLED:false}
      group: ${PAYMENT_EVENT_CONSUMER_GROUP:mealflow-order-payment-consumer}
      topics: ${PAYMENT_EVENT_TOPICS:mealflow-payment-events}
      max-reconsume-times: ${PAYMENT_EVENT_MAX_RECONSUME_TIMES:16}
  services:
    catalog: ${MEAL_CATALOG_URI:http://localhost:8103}
    promotion: ${MEAL_PROMOTION_URI:http://localhost:8107}
    queue: ${MEAL_QUEUE_URI:http://localhost:8106}
    payment: ${MEAL_PAYMENT_URI:http://localhost:8108}
