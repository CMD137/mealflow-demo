spring:
  application:
    name: meal-order
  datasource:
    url: ${ORDER_DB_URL:jdbc:h2:mem:meal_order;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1}
    username: ${ORDER_DB_USERNAME:sa}
    password: ${ORDER_DB_PASSWORD:}
    driver-class-name: ${ORDER_DB_DRIVER:org.h2.Driver}
  sql:
    init:
      mode: always
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
server:
  port: 8105
management:
  endpoints:
    web:
      exposure:
        include: health,info
mealflow:
  services:
    catalog: ${MEAL_CATALOG_URI:http://localhost:8103}
    promotion: ${MEAL_PROMOTION_URI:http://localhost:8107}
    queue: ${MEAL_QUEUE_URI:http://localhost:8106}
    payment: ${MEAL_PAYMENT_URI:http://localhost:8108}
