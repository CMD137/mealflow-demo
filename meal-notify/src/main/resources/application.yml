spring:
  application:
    name: meal-notify
  datasource:
    url: ${NOTIFY_DB_URL:jdbc:h2:mem:meal_notify;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1}
    username: ${NOTIFY_DB_USERNAME:sa}
    password: ${NOTIFY_DB_PASSWORD:}
    driver-class-name: ${NOTIFY_DB_DRIVER:org.h2.Driver}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:4}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  sql:
    init:
      mode: always
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
server:
  port: 8110
management:
  endpoints:
    web:
      exposure:
        include: health,info
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV_ADDR:localhost:9876}
mealflow:
  mq:
    notify-consumer:
      enabled: ${NOTIFY_EVENT_CONSUMER_ENABLED:false}
      group: ${NOTIFY_EVENT_CONSUMER_GROUP:mealflow-notify-domain-consumer}
      topics: ${NOTIFY_EVENT_TOPICS:mealflow-order-events}
      max-reconsume-times: ${NOTIFY_EVENT_MAX_RECONSUME_TIMES:16}
