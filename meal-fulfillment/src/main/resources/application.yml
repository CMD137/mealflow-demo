spring:
  application:
    name: meal-fulfillment
  datasource:
    url: ${FULFILLMENT_DB_URL:jdbc:h2:mem:meal_fulfillment;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1}
    username: ${FULFILLMENT_DB_USERNAME:sa}
    password: ${FULFILLMENT_DB_PASSWORD:}
    driver-class-name: ${FULFILLMENT_DB_DRIVER:org.h2.Driver}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:4}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  sql:
    init:
      mode: always
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
server:
  port: 8109
management:
  endpoints:
    web:
      exposure:
        include: health,info
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV_ADDR:localhost:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:mealflow-fulfillment-producer}
mealflow:
  outbox:
    publisher: ${OUTBOX_PUBLISHER:log}
    topic: ${OUTBOX_TOPIC:mealflow-fulfillment-events}
    scheduler-enabled: ${OUTBOX_SCHEDULER_ENABLED:true}
    initial-delay-ms: ${OUTBOX_INITIAL_DELAY_MS:5000}
    fixed-delay-ms: ${OUTBOX_FIXED_DELAY_MS:5000}
  services:
    order: ${MEAL_ORDER_URI:http://localhost:8105}
    queue: ${MEAL_QUEUE_URI:http://localhost:8106}
