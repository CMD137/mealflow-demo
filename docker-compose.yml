services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: mealflow-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
      - "9848:9848"

  mysql:
    image: mysql:8.0
    container_name: mealflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: mealflow
      MYSQL_DATABASE: mealflow
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - ./meal-auth-user/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/001-auth-user-schema.sql:ro
      - ./meal-auth-user/src/main/resources/data.sql:/docker-entrypoint-initdb.d/002-auth-user-data.sql:ro
      - ./meal-merchant/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/003-merchant-schema.sql:ro
      - ./meal-merchant/src/main/resources/data.sql:/docker-entrypoint-initdb.d/004-merchant-data.sql:ro
      - ./meal-cart/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/005-cart-schema.sql:ro
      - ./meal-catalog/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/010-catalog-schema.sql:ro
      - ./meal-catalog/src/main/resources/data.sql:/docker-entrypoint-initdb.d/011-catalog-data.sql:ro
      - ./meal-queue/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/020-queue-schema.sql:ro
      - ./meal-order/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/025-order-schema.sql:ro
      - ./meal-promotion/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/026-promotion-schema.sql:ro
      - ./meal-promotion/src/main/resources/data.sql:/docker-entrypoint-initdb.d/027-promotion-data.sql:ro
      - ./meal-payment/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/030-payment-schema.sql:ro
      - ./meal-notify/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/040-notify-schema.sql:ro

  redis:
    image: redis:7
    container_name: mealflow-redis
    ports:
      - "6379:6379"

  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: mealflow-rocketmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: mealflow-rocketmq-broker
    depends_on:
      - rocketmq-namesrv
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    command: sh mqbroker -n rocketmq-namesrv:9876
    ports:
      - "10911:10911"

  meal-auth-user:
    image: eclipse-temurin:17-jre
    container_name: mealflow-auth-user
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY_ENABLED: "true"
      AUTH_USER_DB_URL: jdbc:mysql://mysql:3306/mealflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      AUTH_USER_DB_USERNAME: root
      AUTH_USER_DB_PASSWORD: mealflow
      AUTH_USER_DB_DRIVER: com.mysql.cj.jdbc.Driver
    volumes:
      - ./meal-auth-user/target/meal-auth-user-0.1.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-jar", "/app/app.jar"]
    ports:
      - "8101:8101"

  meal-merchant:
    image: eclipse-temurin:17-jre
    container_name: mealflow-merchant
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY_ENABLED: "true"
      MERCHANT_DB_URL: jdbc:mysql://mysql:3306/mealflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      MERCHANT_DB_USERNAME: root
      MERCHANT_DB_PASSWORD: mealflow
      MERCHANT_DB_DRIVER: com.mysql.cj.jdbc.Driver
    volumes:
      - ./meal-merchant/target/meal-merchant-0.1.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-jar", "/app/app.jar"]
    ports:
      - "8102:8102"

  meal-catalog:
    image: eclipse-temurin:17-jre
    container_name: mealflow-catalog
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY_ENABLED: "true"
      CATALOG_DB_URL: jdbc:mysql://mysql:3306/mealflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      CATALOG_DB_USERNAME: root
      CATALOG_DB_PASSWORD: mealflow
      CATALOG_DB_DRIVER: com.mysql.cj.jdbc.Driver
    volumes:
      - ./meal-catalog/target/meal-catalog-0.1.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-jar", "/app/app.jar"]
    ports:
      - "8103:8103"

  meal-cart:
    image: eclipse-temurin:17-jre
    container_name: mealflow-cart
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY_ENABLED: "true"
      CART_DB_URL: jdbc:mysql://mysql:3306/mealflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      CART_DB_USERNAME: root
      CART_DB_PASSWORD: mealflow
      CART_DB_DRIVER: com.mysql.cj.jdbc.Driver
    volumes:
      - ./meal-cart/target/meal-cart-0.1.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-jar", "/app/app.jar"]
    ports:
      - "8104:8104"

  meal-order:
    image: eclipse-temurin:17-jre
    container_name: mealflow-order
    depends_on:
      mysql:
        condition: service_healthy
      meal-catalog:
        condition: service_started
      meal-promotion:
        condition: service_started
      meal-queue:
        condition: service_started
      meal-payment:
        condition: service_started
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY_ENABLED: "true"
      ORDER_DB_URL: jdbc:mysql://mysql:3306/mealflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      ORDER_DB_USERNAME: root
      ORDER_DB_PASSWORD: mealflow
      ORDER_DB_DRIVER: com.mysql.cj.jdbc.Driver
      MEAL_CATALOG_URI: http://meal-catalog:8103
      MEAL_PROMOTION_URI: http://meal-promotion:8107
      MEAL_QUEUE_URI: http://meal-queue:8106
      MEAL_PAYMENT_URI: http://meal-payment:8108
    volumes:
      - ./meal-order/target/meal-order-0.1.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-jar", "/app/app.jar"]
    ports:
      - "8105:8105"

  meal-queue:
    image: eclipse-temurin:17-jre
    container_name: mealflow-queue
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY_ENABLED: "true"
      QUEUE_DB_URL: jdbc:mysql://mysql:3306/mealflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      QUEUE_DB_USERNAME: root
      QUEUE_DB_PASSWORD: mealflow
      QUEUE_DB_DRIVER: com.mysql.cj.jdbc.Driver
    volumes:
      - ./meal-queue/target/meal-queue-0.1.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-jar", "/app/app.jar"]
    ports:
      - "8106:8106"

  meal-promotion:
    image: eclipse-temurin:17-jre
    container_name: mealflow-promotion
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY_ENABLED: "true"
      PROMOTION_DB_URL: jdbc:mysql://mysql:3306/mealflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      PROMOTION_DB_USERNAME: root
      PROMOTION_DB_PASSWORD: mealflow
      PROMOTION_DB_DRIVER: com.mysql.cj.jdbc.Driver
    volumes:
      - ./meal-promotion/target/meal-promotion-0.1.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-jar", "/app/app.jar"]
    ports:
      - "8107:8107"

  meal-payment:
    image: eclipse-temurin:17-jre
    container_name: mealflow-payment
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY_ENABLED: "true"
      PAYMENT_DB_URL: jdbc:mysql://mysql:3306/mealflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      PAYMENT_DB_USERNAME: root
      PAYMENT_DB_PASSWORD: mealflow
      PAYMENT_DB_DRIVER: com.mysql.cj.jdbc.Driver
    volumes:
      - ./meal-payment/target/meal-payment-0.1.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-jar", "/app/app.jar"]
    ports:
      - "8108:8108"

  meal-fulfillment:
    image: eclipse-temurin:17-jre
    container_name: mealflow-fulfillment
    depends_on:
      - meal-order
      - meal-queue
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY_ENABLED: "true"
      MEAL_ORDER_URI: http://meal-order:8105
      MEAL_QUEUE_URI: http://meal-queue:8106
    volumes:
      - ./meal-fulfillment/target/meal-fulfillment-0.1.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-jar", "/app/app.jar"]
    ports:
      - "8109:8109"

  meal-notify:
    image: eclipse-temurin:17-jre
    container_name: mealflow-notify
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY_ENABLED: "true"
      NOTIFY_DB_URL: jdbc:mysql://mysql:3306/mealflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      NOTIFY_DB_USERNAME: root
      NOTIFY_DB_PASSWORD: mealflow
      NOTIFY_DB_DRIVER: com.mysql.cj.jdbc.Driver
    volumes:
      - ./meal-notify/target/meal-notify-0.1.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-jar", "/app/app.jar"]
    ports:
      - "8110:8110"

  meal-gateway:
    image: eclipse-temurin:17-jre
    container_name: mealflow-gateway
    depends_on:
      - meal-auth-user
      - meal-merchant
      - meal-catalog
      - meal-cart
      - meal-order
      - meal-queue
      - meal-promotion
      - meal-payment
      - meal-fulfillment
      - meal-notify
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY_ENABLED: "true"
      MEAL_AUTH_USER_URI: http://meal-auth-user:8101
      MEAL_MERCHANT_URI: http://meal-merchant:8102
      MEAL_CATALOG_URI: http://meal-catalog:8103
      MEAL_CART_URI: http://meal-cart:8104
      MEAL_ORDER_URI: http://meal-order:8105
      MEAL_QUEUE_URI: http://meal-queue:8106
      MEAL_PROMOTION_URI: http://meal-promotion:8107
      MEAL_PAYMENT_URI: http://meal-payment:8108
      MEAL_FULFILLMENT_URI: http://meal-fulfillment:8109
      MEAL_NOTIFY_URI: http://meal-notify:8110
    volumes:
      - ./meal-gateway/target/meal-gateway-0.1.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-jar", "/app/app.jar"]
    ports:
      - "8080:8080"
