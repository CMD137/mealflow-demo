spring:
  application:
    name: meal-promotion
  datasource:
    url: ${PROMOTION_DB_URL:jdbc:h2:mem:meal_promotion;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1}
    username: ${PROMOTION_DB_USERNAME:sa}
    password: ${PROMOTION_DB_PASSWORD:}
    driver-class-name: ${PROMOTION_DB_DRIVER:org.h2.Driver}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:4}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  sql:
    init:
      mode: always
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
server:
  port: 8107
management:
  endpoints:
    web:
      exposure:
        include: health,info
mealflow:
  promotion:
    seckill-mode: ${PROMOTION_SECKILL_MODE:mysql}
    reconcile:
      enabled: ${PROMOTION_RECONCILE_ENABLED:false}
      initial-delay-ms: ${PROMOTION_RECONCILE_INITIAL_DELAY_MS:15000}
      fixed-delay-ms: ${PROMOTION_RECONCILE_FIXED_DELAY_MS:30000}
