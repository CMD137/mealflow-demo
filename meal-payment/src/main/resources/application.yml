spring:
  application:
    name: meal-payment
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:h2:mem:meal_payment;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1}
    username: ${PAYMENT_DB_USERNAME:sa}
    password: ${PAYMENT_DB_PASSWORD:}
    driver-class-name: ${PAYMENT_DB_DRIVER:org.h2.Driver}
  sql:
    init:
      mode: always
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
server:
  port: 8108
management:
  endpoints:
    web:
      exposure:
        include: health,info
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV_ADDR:localhost:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:mealflow-payment-producer}
mealflow:
  outbox:
    publisher: ${OUTBOX_PUBLISHER:log}
    topic: ${OUTBOX_TOPIC:mealflow-payment-events}
    scheduler-enabled: ${OUTBOX_SCHEDULER_ENABLED:true}
    initial-delay-ms: ${OUTBOX_INITIAL_DELAY_MS:5000}
    fixed-delay-ms: ${OUTBOX_FIXED_DELAY_MS:5000}
