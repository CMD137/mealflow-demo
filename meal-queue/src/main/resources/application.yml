spring:
  application:
    name: meal-queue
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: ${QUEUE_DB_URL:jdbc:h2:mem:meal_queue;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1}
    username: ${QUEUE_DB_USERNAME:sa}
    password: ${QUEUE_DB_PASSWORD:}
    driver-class-name: ${QUEUE_DB_DRIVER:org.h2.Driver}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:4}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  sql:
    init:
      mode: always
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
server:
  port: 8106
management:
  endpoints:
    web:
      exposure:
        include: health,info
mealflow:
  queue:
    waiting-store: ${QUEUE_WAITING_STORE:local}
